# DOCUMENTATION ONLY — this file is NOT mounted into the running container.
#
# stellar-core configuration that documents what is running inside the
# stellar/quickstart --local validator (i.e. the quickstart-quickstart
# service in scripts/dev/docker-compose.yml). It is functionally identical
# to /opt/stellar-default/local/core/etc/stellar-core.cfg inside the
# quickstart image, with the placeholders __NETWORK__, __DATABASE__,
# __MANUAL_CLOSE__ resolved.
#
# Why ship it without mounting:
#
#   We can't mount just this file at /opt/stellar/core/etc/stellar-core.cfg
#   because quickstart's start script's copy_defaults() also needs to copy
#   /opt/stellar-default/local/core/etc/config-settings/ (per-protocol JSON
#   network upgrade settings). The skip-if-etc-exists check is dir-level, so
#   mounting our cfg into a fresh etc/ would prevent config-settings/ from
#   being copied and stellar-core would fail to start.
#
#   Mounting the WHOLE etc/ (our cfg + a copy of bundled config-settings/)
#   works but is fragile across quickstart image versions.
#
#   So we rely on the bundled config — which uses the same well-known
#   NODE_SEED below — and treat this file as the canonical record of what
#   that config contains.
#
# Why this matters for cross-backend comparison:
#
#   captive-core-follower.cfg (in this same dir) hardcodes the validator's
#   public key derived from NODE_SEED below. To verify the derivation:
#
#     go run test/scripts/dev/configs/derive_pubkey.go

HTTP_PORT=11626
PUBLIC_HTTP_PORT=true
LOG_FILE_PATH="/var/log/stellar-core/stellar-core-{datetime:%Y-%m-%d_%H-%M-%S}.log"

# false = automatic block production every 5s; true = blocks only on demand
# via the /manualclose HTTP endpoint. Keep false for the dev loop.
MANUAL_CLOSE=false

# Tells stellar-core to close ledgers as fast as possible regardless of
# wall-clock — turns the 5s ledger close target into ~1s in standalone mode.
ARTIFICIALLY_ACCELERATE_TIME_FOR_TESTING=true

NETWORK_PASSPHRASE="Standalone Network ; February 2017"

# Well-known standalone seed. Public key:
#   GCTI6HMWRH2QGMFKWVU5M5ZSOTKL7P7JAHZDMJJBKDHGWTEC4CJ7O3DU
# Same as the one quickstart bundles in /opt/stellar-default/local/core/etc.
NODE_SEED="SDQVDISRYN2JXBS7ICL7QJAEKB3HWBJFP2QECXG7GZICAHBK4UNJCWK2 self"
NODE_IS_VALIDATOR=true

DATABASE="sqlite3:///opt/stellar/core/data/stellar.db"

FAILURE_SAFETY=0
UNSAFE_QUORUM=true

# Single-validator quorum (the validator trusts only itself in standalone).
[QUORUM_SET]
THRESHOLD_PERCENT=100
VALIDATORS=["$self"]

# History archive served from a local directory; quickstart's start script
# also runs an nginx serving this dir at http://localhost:1570 so external
# captive-core peers can fetch backfill.
[HISTORY.vs]
get="cp /opt/stellar/history-archive/data/{0} {1}"
put="cp {0} /opt/stellar/history-archive/data/{1}"
mkdir="mkdir -p /opt/stellar/history-archive/data/{0}"
