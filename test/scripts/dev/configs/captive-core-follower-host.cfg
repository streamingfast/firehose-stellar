# Captive-core configuration for the IN-PROCESS battlefield-stellar
# fetcher running on the host (not inside docker).
#
# Used by test/scenarios/main_test.go's InProcessCaptiveCoreFetcher when
# stellar-core is invoked directly from `go test`. The only difference
# from captive-core-follower.cfg is the peer + history addresses: from
# the host we can't resolve `quickstart` (the docker service hostname),
# so we use localhost + the ports docker-compose exposes.
#
# The captivecore.Config.HistoryArchiveURLs supplied by the Go caller
# overrides the HISTORY URL templated below — they must match, so keep
# both pointed at the host-mapped port (default 1570).

NETWORK_PASSPHRASE="Standalone Network ; February 2017"

# Peer + history reachable on the host via the ports docker-compose
# exposes (see test/scripts/dev/docker-compose.yml `ports:` section).
KNOWN_PEERS=["localhost:11625"]

# Listen on a different peer port than the quickstart container — host
# port 11625 is already taken by the docker-compose port mapping, so
# binding 0.0.0.0:11625 from this stellar-core process would fail with
# EADDRINUSE.
PEER_PORT=11626

NODE_IS_VALIDATOR=false

FAILURE_SAFETY=0
UNSAFE_QUORUM=true

ARTIFICIALLY_ACCELERATE_TIME_FOR_TESTING=true

[[HOME_DOMAINS]]
HOME_DOMAIN="local.stellar"
QUALITY="LOW"

[[VALIDATORS]]
NAME="quickstart_validator"
HOME_DOMAIN="local.stellar"
PUBLIC_KEY="GCTI6HMWRH2QGMFKWVU5M5ZSOTKL7P7JAHZDMJJBKDHGWTEC4CJ7O3DU"
ADDRESS="localhost:11625"
HISTORY="curl -sf http://localhost:1570/{0} -o {1}"
